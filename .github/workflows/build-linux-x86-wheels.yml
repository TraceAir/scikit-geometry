name: Build Linux x86 Wheels (No Docker)

on:
  push:
    branches: [ ta-develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ ta-develop ]
  workflow_dispatch:
    inputs:
      python_versions:
        description: 'Python versions to build (comma-separated)'
        required: false
        default: '3.10'
      cgal_version:
        description: 'CGAL version tag'
        required: false
        default: 'v5.6'

jobs:
  build-linux-x86-wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10']

    env:
      CGAL_VERSION: ${{ github.event.inputs.cgal_version || 'v5.6' }}
      BOOST_VERSION: "1.84.0"
      BOOST_VERSION_UNDERSCORE: "1_84_0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        # Update package lists
        sudo apt-get update

        # Install system dependencies
        sudo apt-get install -y \
          build-essential \
          cmake \
          libgmp-dev \
          libmpfr-dev \
          libeigen3-dev \
          git \
          curl

    - name: Install Python build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install wheel setuptools pybind11 numpy pytest matplotlib IPython auditwheel

    - name: Install Boost
      run: |
        cd /tmp
        curl -L -o boost_${BOOST_VERSION_UNDERSCORE}.tar.gz \
          "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
        tar xzf boost_${BOOST_VERSION_UNDERSCORE}.tar.gz
        cd boost_${BOOST_VERSION_UNDERSCORE}

        # Configure for shared libraries only
        ./bootstrap.sh --prefix=/tmp/lib/boost \
          --with-libraries=system,filesystem,program_options,iostreams,serialization,thread,date_time,chrono,atomic

        # Build shared libraries only
        ./b2 -j$(nproc) \
          variant=release \
          link=shared \
          threading=multi \
          runtime-link=shared \
          cxxflags="-fPIC" \
          install

        # Clean up
        rm -rf /tmp/boost_${BOOST_VERSION_UNDERSCORE}*

    - name: Install CGAL
      run: |
        # Clone and build CGAL
        git clone --branch ${CGAL_VERSION} --depth 1 https://github.com/CGAL/cgal.git /tmp/cgal/
        cd /tmp/cgal/
        mkdir build && cd build

        # Configure CGAL to find our Boost installation
        cmake -DCMAKE_INSTALL_PREFIX=/tmp/lib/cgal \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -DBOOST_ROOT=/tmp/lib/boost \
              -DBoost_NO_SYSTEM_PATHS=ON \
              -DBoost_USE_STATIC_LIBS=OFF \
              ..

        make -j$(nproc) install

        # Clean up
        cd /
        rm -rf /tmp/cgal

    - name: Build wheel
      run: |
        # Set environment variables for build
        export CGAL_DIR="/tmp/lib/cgal"
        export BOOST_ROOT="/tmp/lib/boost"

        # Add library paths for linking
        export LDFLAGS="-L/tmp/lib/cgal/lib -L/tmp/lib/boost/lib"
        export CPPFLAGS="-I/tmp/lib/cgal/include -I/tmp/lib/boost/include"
        export LD_LIBRARY_PATH="/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$LD_LIBRARY_PATH"

        # Build the wheel
        python setup.py build_ext --inplace
        python setup.py bdist_wheel

    - name: Repair wheel
      run: |
        mkdir -p dist/repaired/

        # Help auditwheel find our custom libraries
        export LD_LIBRARY_PATH="/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$LD_LIBRARY_PATH"

        # Repair the wheel to make it manylinux compatible
        auditwheel repair dist/*.whl -w dist/repaired/

    - name: Run tests
      continue-on-error: true
      run: |
        set -ex
        export LD_LIBRARY_PATH="/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$LD_LIBRARY_PATH"

        # Disable interactive matplotlib backend
        export MPLBACKEND=Agg

        # Create a virtual environment for testing
        python -m venv venv
        source venv/bin/activate

        # Install dependencies
        pip install IPython pytest matplotlib pytest-timeout pytest-forked

        # Install the wheel
        pip install dist/repaired/*.whl

        # Run tests
        pytest test -v

    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-x86-wheels-py${{ matrix.python-version }}
        path: |
          dist/repaired/*.whl
          dist/*.whl
        retention-days: 90
