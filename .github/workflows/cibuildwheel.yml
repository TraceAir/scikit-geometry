name: Build macOS Wheels

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      python_versions:
        description: 'Python versions to build (comma-separated)'
        required: false
        default: '3.10,3.11,3.12'
      cgal_version:
        description: 'CGAL version tag'
        required: false
        default: 'v5.6'

jobs:
  build-macos-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]

    env:
      CGAL_VERSION: ${{ github.event.inputs.cgal_version || 'v5.6' }}
      BOOST_VERSION: "1.84.0"
      BOOST_VERSION_UNDERSCORE: "1_84_0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # This is just for the build environment

    - name: Create build script
      run: |
        cat > build_deps.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "=== Setting up build environment ==="
        
        # Get Homebrew prefix
        HOMEBREW_PREFIX=$(brew --prefix)
        
        # Update Homebrew and install system dependencies
        brew update
        brew install cmake gmp mpfr eigen
        
        echo "=== Installing Boost ==="
        cd /tmp
        curl -L -o boost_1_84_0.tar.gz \
          "https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz"
        tar xzf boost_1_84_0.tar.gz
        cd boost_1_84_0
        
        # Configure Boost for static linking to avoid dynamic library issues
        ./bootstrap.sh --prefix=/tmp/lib/boost \
          --with-libraries=system,filesystem,program_options,iostreams,serialization,thread,date_time,chrono,atomic
        
        # Build static libraries
        ./b2 -j$(sysctl -n hw.ncpu) \
          variant=release \
          link=static \
          threading=multi \
          runtime-link=shared \
          cxxflags="-fPIC" \
          install
        
        echo "Boost libraries installed:"
        ls -la /tmp/lib/boost/lib/
        
        # Clean up
        cd /
        rm -rf /tmp/boost_1_84_0*
        
        echo "=== Installing CGAL ==="
        git clone --branch ${CGAL_VERSION:-v5.6} --depth 1 https://github.com/CGAL/cgal.git /tmp/cgal/
        cd /tmp/cgal/
        mkdir build && cd build
        
        cmake -DCMAKE_INSTALL_PREFIX=/tmp/lib/cgal \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -DBOOST_ROOT=/tmp/lib/boost \
              -DBoost_NO_SYSTEM_PATHS=ON \
              -DBoost_USE_STATIC_LIBS=ON \
              ..
        
        make -j$(sysctl -n hw.ncpu) install
        
        echo "CGAL installed:"
        ls -la /tmp/lib/cgal/
        
        # Clean up
        cd /
        rm -rf /tmp/cgal
        
        echo "=== Setting up environment variables ==="
        # Export variables that will be used by setup.py
        export MACOSX_DEPLOYMENT_TARGET=10.14
        export CGAL_DIR="/tmp/lib/cgal"
        export BOOST_DIR="/tmp/lib/boost"
        export BOOST_ROOT="/tmp/lib/boost"
        export Boost_USE_STATIC_LIBS=ON
        export GMP_DIR="$HOMEBREW_PREFIX"
        export MPFR_DIR="$HOMEBREW_PREFIX"
        export EIGEN3_INCLUDE_DIR="$HOMEBREW_PREFIX/include/eigen3"
        
        # Set compiler flags
        export CPPFLAGS="-I$HOMEBREW_PREFIX/include -I/tmp/lib/cgal/include -I/tmp/lib/boost/include"
        export LDFLAGS="-L$HOMEBREW_PREFIX/lib -L/tmp/lib/cgal/lib -L/tmp/lib/boost/lib -lgmp -lmpfr"
        export CPATH="$HOMEBREW_PREFIX/include:/tmp/lib/boost/include:/tmp/lib/cgal/include"
        export LIBRARY_PATH="$HOMEBREW_PREFIX/lib:/tmp/lib/boost/lib:/tmp/lib/cgal/lib"
        
        echo "Build environment ready!"
        EOF
        
        chmod +x build_deps.sh

    - name: Build wheels with cibuildwheel
      uses: pypa/cibuildwheel@v2.16.2
      env:
        # Build only for macOS ARM64 (adjust as needed)
        CIBW_ARCHS_MACOS: "arm64"
        
        # Python versions to build for
        CIBW_BUILD: "${{ github.event.inputs.python_versions && format('cp{0}-*', join(split(github.event.inputs.python_versions, ','), '-* cp')) || 'cp310-* cp311-* cp312-*' }}"
        
        # Skip PyPy and other variants
        CIBW_SKIP: "pp* *-musllinux*"
        
        # Before build: install dependencies
        CIBW_BEFORE_BUILD_MACOS: |
          ./build_deps.sh
        
        # Environment variables for the build
        CIBW_ENVIRONMENT_MACOS: >
          MACOSX_DEPLOYMENT_TARGET=10.14
          CGAL_DIR="/tmp/lib/cgal"
          BOOST_DIR="/tmp/lib/boost"
          BOOST_ROOT="/tmp/lib/boost"
          Boost_USE_STATIC_LIBS=ON
          GMP_DIR="$(brew --prefix)"
          MPFR_DIR="$(brew --prefix)"
          EIGEN3_INCLUDE_DIR="$(brew --prefix)/include/eigen3"
          CPPFLAGS="-I$(brew --prefix)/include -I/tmp/lib/cgal/include -I/tmp/lib/boost/include"
          LDFLAGS="-L$(brew --prefix)/lib -L/tmp/lib/cgal/lib -L/tmp/lib/boost/lib -lgmp -lmpfr"
          CPATH="$(brew --prefix)/include:/tmp/lib/boost/include:/tmp/lib/cgal/include"
          LIBRARY_PATH="$(brew --prefix)/lib:/tmp/lib/boost/lib:/tmp/lib/cgal/lib"
        
        # Test command (adjust based on your package structure)
        CIBW_TEST_COMMAND: "python -c 'import skgeom; print(\"Import successful!\")'"
        
        # Additional test requirements
        CIBW_TEST_REQUIRES: "pytest numpy matplotlib"
        
        # Optional: run actual tests if you have them
        # CIBW_TEST_COMMAND: "python -m pytest {project}/test -v"
        
        # Repair wheel settings (cibuildwheel handles this automatically)
        CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs {wheel} -w {dest_dir} {wheel}"

    - name: Verify wheels
      run: |
        echo "=== Built wheels ==="
        ls -la wheelhouse/
        
        echo "=== Wheel contents ==="
        for wheel in wheelhouse/*.whl; do
          echo "Contents of $wheel:"
          python -m zipfile -l "$wheel" | head -20
          echo "---"
        done

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-wheels-${{ matrix.os }}
        path: wheelhouse/*.whl
        retention-days: 30

  # Job to create a release with all wheels
  create-release:
    needs: build-macos-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v4
      with:
        path: wheels/

    - name: Flatten wheel directory
      run: |
        mkdir -p dist/
        find wheels/ -name "*.whl" -exec cp {} dist/ \;
        ls -la dist/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.whl
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
