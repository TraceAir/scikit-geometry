name: Build macOS Wheels (Simple)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        brew install cgal boost gmp mpfr
        pip install wheel setuptools pybind11 numpy pytest delocate
        
        # Set environment for build
        echo "CPPFLAGS=-I$(brew --prefix)/include" >> $GITHUB_ENV
        echo "LDFLAGS=-L$(brew --prefix)/lib" >> $GITHUB_ENV

    - name: Install CGAL
      run: |
        # Clone and build CGAL
        cd /tmp
        git clone --branch v5.6 --depth 1 https://github.com/CGAL/cgal.git
        cd cgal
        mkdir build && cd build
        
        cmake -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -DCGAL_HEADER_ONLY=ON \
              ..
        
        make -j$(sysctl -n hw.ncpu) install
        
        # Clean up
        cd /
        rm -rf /tmp/cgal

    - name: Build and test
      run: |
        python setup.py bdist_wheel
        pip install dist/*.whl
        python -m pytest test -v

    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: macos-wheel
        path: dist/*.whl