name: Build macOS Wheels

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      python_versions:
        description: 'Python versions to build (comma-separated)'
        required: false
        default: '3.10'
      cgal_version:
        description: 'CGAL version tag'
        required: false
        default: 'v5.6'

jobs:
  build-macos-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
        python-version: ['3.10']

    env:
      CGAL_VERSION: ${{ github.event.inputs.cgal_version || 'v5.6' }}
      BOOST_VERSION: "1.84.0"
      BOOST_VERSION_UNDERSCORE: "1_84_0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Homebrew dependencies
      run: |
        # Update Homebrew
        brew update
        
        # Install system dependencies
        brew install cmake gmp mpfr eigen boost
        
        # Install Python build dependencies
        python -m pip install --upgrade pip
        python -m pip install wheel setuptools pybind11 numpy pytest matplotlib

    - name: Install Boost
      run: |
        # Boost is already installed via Homebrew, just verify
        echo "Boost installed via Homebrew"
        ls -la /opt/homebrew/include/boost/ || ls -la /usr/local/include/boost/ || echo "Boost headers location unknown"

    - name: Install CGAL
      run: |
        set -x
        # Clone and build CGAL
        git clone --branch ${CGAL_VERSION} --depth 1 https://github.com/CGAL/cgal.git /tmp/cgal/
        cd /tmp/cgal/
        mkdir build && cd build
        
        cmake  \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -DWITH_CGAL_Qt5=OFF -DWITH_CGAL_Qt3=OFF -DWITH_CGAL_Qt4=OFF -DWITH_CGAL_Qt3=false -DWITH_CGAL_Qt4=false -DWITH_CGAL_Qt5=false \
              -DWITH_CGAL_ImageIO=OFF -DWITH_demos=OFF -WITH_examples=OFF \
              -DCGAL_HEADER_ONLY=ON \
              ..
        
        make -j$(sysctl -n hw.ncpu) install
        
        # Clean up
        cd /
        rm -rf /tmp/cgal

    - name: Build wheel
      run: |
        # Set environment variables for the build
        export MACOSX_DEPLOYMENT_TARGET=10.14
        export CMAKE_OSX_DEPLOYMENT_TARGET=10.14
        
        # Set up include and library paths
        if [ -d "/opt/homebrew" ]; then
          # Apple Silicon Mac
          export CPPFLAGS="-I/opt/homebrew/include $CPPFLAGS"
          export LDFLAGS="-L/opt/homebrew/lib $LDFLAGS"
          export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
        else
          # Intel Mac
          export CPPFLAGS="-I/usr/local/include $CPPFLAGS"
          export LDFLAGS="-L/usr/local/lib $LDFLAGS"
          export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH"
        fi
        
        # Debug: Show what CGAL files are available
        echo "CGAL headers check:"
        find /opt/homebrew/include /usr/local/include -name "*CGAL*" -type d 2>/dev/null | head -5
        find /opt/homebrew/include /usr/local/include -name "Exact_predicates_exact_constructions_kernel.h" 2>/dev/null || echo "CGAL kernel header not found"
        
        # Build the extension in place first
        python setup.py build_ext --inplace
        
        # Build the wheel
        python setup.py bdist_wheel

    - name: Run tests
      run: |
        # Install the wheel for testing
        pip install dist/*.whl
        
        # Run tests
        python -m pytest test -v

    - name: Repair wheel with delocate
      run: |
        # Install delocate for wheel repair
        pip install delocate
        
        # Repair the wheel (bundle dependencies)
        delocate-wheel -w dist/repaired/ dist/*.whl

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
        path: dist/repaired/*.whl
        retention-days: 30

  # Job to collect all wheels and create a release
  collect-wheels:
    needs: build-macos-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v4
      with:
        path: wheels/

    - name: Flatten wheel directory
      run: |
        mkdir -p dist/
        find wheels/ -name "*.whl" -exec cp {} dist/ \;
        ls -la dist/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.whl
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}