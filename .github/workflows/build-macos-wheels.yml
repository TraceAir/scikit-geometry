name: Build macOS Wheels

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      python_versions:
        description: 'Python versions to build (comma-separated)'
        required: false
        default: '3.8,3.9,3.10,3.11,3.12'
      cgal_version:
        description: 'CGAL version tag'
        required: false
        default: 'v5.6'

jobs:
  build-macos-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-11, macos-12, macos-13]
        python-version: ['3.9', '3.10']
        exclude:
          # macOS 13 doesn't support Python 3.8
          - os: macos-13
            python-version: '3.8'

    env:
      CGAL_VERSION: ${{ github.event.inputs.cgal_version || 'v5.6' }}
      BOOST_VERSION: "1.84.0"
      BOOST_VERSION_UNDERSCORE: "1_84_0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Homebrew dependencies
      run: |
        # Update Homebrew
        brew update
        
        # Install system dependencies
        brew install cmake gmp mpfr eigen
        
        # Install Python build dependencies
        python -m pip install --upgrade pip
        python -m pip install wheel setuptools pybind11 numpy pytest matplotlib

    - name: Install Boost
      run: |
        # Download and build Boost
        cd /tmp
        curl -L -o boost_${BOOST_VERSION_UNDERSCORE}.tar.gz \
          "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
        tar xzf boost_${BOOST_VERSION_UNDERSCORE}.tar.gz
        cd boost_${BOOST_VERSION_UNDERSCORE}
        
        ./bootstrap.sh --prefix=/usr/local \
          --with-libraries=system,filesystem,program_options,iostreams,serialization,thread,date_time,chrono,atomic
        
        ./b2 -j$(sysctl -n hw.ncpu) install
        
        # Clean up
        cd /
        rm -rf /tmp/boost_${BOOST_VERSION_UNDERSCORE}*

    - name: Install CGAL
      run: |
        # Clone and build CGAL
        cd /tmp
        git clone --branch ${CGAL_VERSION} --depth 1 https://github.com/CGAL/cgal.git
        cd cgal
        mkdir build && cd build
        
        cmake -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -DCGAL_HEADER_ONLY=ON \
              ..
        
        make -j$(sysctl -n hw.ncpu) install
        
        # Clean up
        cd /
        rm -rf /tmp/cgal

    - name: Build wheel
      run: |
        # Set environment variables for the build
        export MACOSX_DEPLOYMENT_TARGET=10.14
        export CMAKE_OSX_DEPLOYMENT_TARGET=10.14
        
        # Build the extension in place first
        python setup.py build_ext --inplace
        
        # Build the wheel
        python setup.py bdist_wheel

    - name: Run tests
      run: |
        # Install the wheel for testing
        pip install dist/*.whl
        
        # Run tests
        python -m pytest test -v

    - name: Repair wheel with delocate
      run: |
        # Install delocate for wheel repair
        pip install delocate
        
        # Repair the wheel (bundle dependencies)
        delocate-wheel -w dist/repaired/ dist/*.whl

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: macos-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
        path: dist/repaired/*.whl
        retention-days: 30

  # Job to collect all wheels and create a release
  collect-wheels:
    needs: build-macos-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v3
      with:
        path: wheels/

    - name: Flatten wheel directory
      run: |
        mkdir -p dist/
        find wheels/ -name "*.whl" -exec cp {} dist/ \;
        ls -la dist/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.whl
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}