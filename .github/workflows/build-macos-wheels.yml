name: Build macOS Wheels (Simple)

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        required: true
        default: '3.10'
        type: choice
        options:
        - '3.8'
        - '3.9'
        - '3.10'
        - '3.11'
        - '3.12'
      cgal_version:
        description: 'CGAL version tag'
        required: false
        default: 'v5.6'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ github.event.inputs.python_version }}

    - name: Create local install directory
      run: |
        mkdir -p $HOME/local

    - name: Install Homebrew dependencies
      run: |
        # Update Homebrew
        brew update
        
        # Install system dependencies
        brew install cmake gmp mpfr eigen
        
        # Install Python build dependencies
        python -m pip install --upgrade pip
        python -m pip install wheel setuptools pybind11 numpy pytest matplotlib

    - name: Install Boost
      env:
        BOOST_VERSION: "1.84.0"
        BOOST_VERSION_UNDERSCORE: "1_84_0"
        BOOST_ROOT: "$HOME/local/boost"
      run: |
        # Download and build Boost
        cd /tmp
        curl -L -o boost_${BOOST_VERSION_UNDERSCORE}.tar.gz \
          "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
        tar xzf boost_${BOOST_VERSION_UNDERSCORE}.tar.gz
        cd boost_${BOOST_VERSION_UNDERSCORE}
        
        ./bootstrap.sh --prefix=${BOOST_ROOT} \
          --with-libraries=system,filesystem,program_options,iostreams,serialization,thread,date_time,chrono,atomic
        
        ./b2 -j$(sysctl -n hw.ncpu) install
        
        # Clean up
        cd /
        rm -rf /tmp/boost_${BOOST_VERSION_UNDERSCORE}*

    - name: Install CGAL
      env:
        CGAL_ROOT: "$HOME/local/cgal"
      run: |
        # Clone and build CGAL
        cd /tmp
        git clone --branch ${{ github.event.inputs.cgal_version }} --depth 1 https://github.com/CGAL/cgal.git
        cd cgal
        mkdir build && cd build
        
        cmake -DCMAKE_INSTALL_PREFIX=${CGAL_ROOT} \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              ..
        
        make install | (sed -u 20q;tail -n20)
        
        # Clean up
        cd /
        rm -rf /tmp/cgal

    - name: Build wheel
      env:
        BOOST_ROOT: "$HOME/local/boost"
        CGAL_DIR: "$HOME/local/cgal/lib/cmake/CGAL"
      run: |
        export MACOSX_DEPLOYMENT_TARGET=10.14
        export PATH="$HOME/local/boost/bin:$PATH"
        export LD_LIBRARY_PATH="$HOME/local/boost/lib:$HOME/local/cgal/lib:$LD_LIBRARY_PATH"
        export CPATH="$HOME/local/boost/include:$HOME/local/cgal/include:$CPATH"
        export LIBRARY_PATH="$HOME/local/boost/lib:$HOME/local/cgal/lib:$LIBRARY_PATH"
        python setup.py bdist_wheel

    - name: Test wheel
      run: |
        pip install dist/*.whl
        python -m pytest test -v

    - name: Repair wheel
      run: |
        delocate-wheel -w dist/repaired/ dist/*.whl

    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: macos-wheel-py${{ github.event.inputs.python_version }}
        path: dist/repaired/*.whl