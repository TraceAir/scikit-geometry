name: Build macOS Wheels

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      python_versions:
        description: 'Python versions to build (comma-separated)'
        required: false
        default: '3.10'
      cgal_version:
        description: 'CGAL version tag'
        required: false
        default: 'v5.6'

jobs:
  build-macos-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
        python-version: ['3.10']

    env:
      CGAL_VERSION: ${{ github.event.inputs.cgal_version || 'v5.6' }}
      BOOST_VERSION: "1.84.0"
      BOOST_VERSION_UNDERSCORE: "1_84_0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Homebrew dependencies
      run: |
        # Update Homebrew
        brew update
        
        # Install system dependencies
        brew install cmake gmp mpfr eigen
        
        # Install Python build dependencies
        python -m pip install --upgrade pip
        python -m pip install wheel setuptools pybind11 numpy pytest matplotlib

    - name: Set Homebrew paths
      run: |
        # Get Homebrew prefix and set environment variables
        HOMEBREW_PREFIX=$(brew --prefix)
        echo "HOMEBREW_PREFIX=$HOMEBREW_PREFIX" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$HOMEBREW_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "CPPFLAGS=-I$HOMEBREW_PREFIX/include" >> $GITHUB_ENV
        echo "LDFLAGS=-L$HOMEBREW_PREFIX/lib" >> $GITHUB_ENV

    - name: Install Boost
      run: |
        # Download and build Boost
        cd /tmp
        curl -L -o boost_${BOOST_VERSION_UNDERSCORE}.tar.gz \
          "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
        tar xzf boost_${BOOST_VERSION_UNDERSCORE}.tar.gz
        cd boost_${BOOST_VERSION_UNDERSCORE}
        
        ./bootstrap.sh --prefix=/tmp/lib/boost \
          --with-libraries=system,filesystem,program_options,iostreams,serialization,thread,date_time,chrono,atomic
        
        ./b2 -j$(sysctl -n hw.ncpu) install
        
        # Clean up
        cd /
        rm -rf /tmp/boost_${BOOST_VERSION_UNDERSCORE}*

    - name: Install CGAL
      run: |
        set -x
        # Clone and build CGAL
        git clone --branch ${CGAL_VERSION} --depth 1 https://github.com/CGAL/cgal.git /tmp/cgal/
        cd /tmp/cgal/
        mkdir build && cd build
        
        cmake -DCMAKE_INSTALL_PREFIX=/tmp/lib/cgal -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
        
        make install
        
        # Clean up
        cd /
        rm -rf /tmp/cgal

    - name: Debug library paths
      run: |
        echo "Homebrew prefix: $HOMEBREW_PREFIX"
        ls -la $HOMEBREW_PREFIX/lib/libgmp*
        ls -la $HOMEBREW_PREFIX/lib/libmpfr*
        echo "LDFLAGS: $LDFLAGS"
        echo "CPPFLAGS: $CPPFLAGS"

    - name: Build wheel
      run: |
        # Set environment variables for the build
        export MACOSX_DEPLOYMENT_TARGET=10.14
        export CGAL_DIR="/tmp/lib/cgal"
        export BOOST_DIR="/tmp/lib/boost"
        export BOOST_ROOT="/tmp/lib/boost"
        
        # Add Homebrew paths to build environment
        export CPATH="$HOMEBREW_PREFIX/include:/tmp/lib/boost/include:/tmp/lib/cgal/include:$CPATH"
        export LIBRARY_PATH="$HOMEBREW_PREFIX/lib:/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="$HOMEBREW_PREFIX/lib:/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$LD_LIBRARY_PATH"
        
        # Set compiler flags to include all necessary paths
        export CPPFLAGS="-I$HOMEBREW_PREFIX/include -I/tmp/lib/cgal/include -I/tmp/lib/boost/include"
        export LDFLAGS="-L$HOMEBREW_PREFIX/lib -L/tmp/lib/cgal/lib -L/tmp/lib/boost/lib -lgmp -lmpfr"
        
        # Set additional environment variables for setup.py
        export GMP_DIR="$HOMEBREW_PREFIX"
        export MPFR_DIR="$HOMEBREW_PREFIX"
        export EIGEN3_INCLUDE_DIR="$HOMEBREW_PREFIX/include/eigen3"
        
        # Build the extension in place first with explicit paths
        python setup.py build_ext --inplace \
          --include-dirs="$HOMEBREW_PREFIX/include:$HOMEBREW_PREFIX/include/eigen3:/tmp/lib/cgal/include:/tmp/lib/boost/include" \
          --library-dirs="$HOMEBREW_PREFIX/lib:/tmp/lib/cgal/lib:/tmp/lib/boost/lib"
        
        # Build the wheel
        python setup.py bdist_wheel

    - name: Repair wheel with delocate
      run: |
        # Install delocate for wheel repair
        pip install delocate
        
        # Repair the wheel (bundle dependencies)
        delocate-wheel -w dist/repaired/ dist/*.whl

    - name: Run tests
      run: |
        # Install the wheel for testing
        pip install dist/repaired/*.whl
        
        # Run tests
        python -m pytest test -v

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
        path: dist/repaired/*.whl
        retention-days: 30

  # Job to collect all wheels and create a release
  collect-wheels:
    needs: build-macos-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v4
      with:
        path: wheels/

    - name: Flatten wheel directory
      run: |
        mkdir -p dist/
        find wheels/ -name "*.whl" -exec cp {} dist/ \;
        ls -la dist/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.whl
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}