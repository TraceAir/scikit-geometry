name: Build macOS Wheels

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      python_versions:
        description: 'Python versions to build (comma-separated)'
        required: false
        default: '3.10'
      cgal_version:
        description: 'CGAL version tag'
        required: false
        default: 'v5.6'

jobs:
  build-macos-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
        python-version: ['3.10']

    env:
      CGAL_VERSION: ${{ github.event.inputs.cgal_version || 'v5.6' }}
      BOOST_VERSION: "1.84.0"
      BOOST_VERSION_UNDERSCORE: "1_84_0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Homebrew dependencies
      run: |
        # Update Homebrew
        brew update
        
        # Install system dependencies
        brew install cmake gmp mpfr eigen
        
        # Install Python build dependencies
        python -m pip install --upgrade pip
        python -m pip install wheel setuptools pybind11 numpy pytest matplotlib

    - name: Set Homebrew paths
      run: |
        # Get Homebrew prefix and set environment variables
        HOMEBREW_PREFIX=$(brew --prefix)
        echo "HOMEBREW_PREFIX=$HOMEBREW_PREFIX" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$HOMEBREW_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "CPPFLAGS=-I$HOMEBREW_PREFIX/include" >> $GITHUB_ENV
        echo "LDFLAGS=-L$HOMEBREW_PREFIX/lib" >> $GITHUB_ENV

    - name: Install Boost with static libraries
      run: |
        # Download and build Boost with static libraries
        cd /tmp
        curl -L -o boost_${BOOST_VERSION_UNDERSCORE}.tar.gz \
          "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
        tar xzf boost_${BOOST_VERSION_UNDERSCORE}.tar.gz
        cd boost_${BOOST_VERSION_UNDERSCORE}
        
        # Configure for both static and shared libraries
        ./bootstrap.sh --prefix=/tmp/lib/boost \
          --with-libraries=system,filesystem,program_options,iostreams,serialization,thread,date_time,chrono,atomic
        
        # Build both static and shared libraries
        ./b2 -j$(sysctl -n hw.ncpu) \
          variant=release \
          link=shared,static \
          threading=multi \
          runtime-link=shared \
          cxxflags="-fPIC" \
          install
        
        # Verify libraries were built
        echo "Boost libraries built:"
        ls -la /tmp/lib/boost/lib/
        
        # Clean up
        cd /
        rm -rf /tmp/boost_${BOOST_VERSION_UNDERSCORE}*

    - name: Install CGAL
      run: |
        set -x
        # Clone and build CGAL
        git clone --branch ${CGAL_VERSION} --depth 1 https://github.com/CGAL/cgal.git /tmp/cgal/
        cd /tmp/cgal/
        mkdir build && cd build
        
        # Configure CGAL to find our Boost installation
        cmake -DCMAKE_INSTALL_PREFIX=/tmp/lib/cgal \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -DBOOST_ROOT=/tmp/lib/boost \
              -DBoost_NO_SYSTEM_PATHS=ON \
              -DBoost_USE_STATIC_LIBS=OFF \
              ..
        
        make install
        
        # Clean up
        cd /
        rm -rf /tmp/cgal

    - name: Debug library paths
      run: |
        echo "=== Homebrew prefix: $HOMEBREW_PREFIX ==="
        ls -la $HOMEBREW_PREFIX/lib/libgmp*
        ls -la $HOMEBREW_PREFIX/lib/libmpfr*
        echo "=== Boost libraries ==="
        ls -la /tmp/lib/boost/lib/libboost_*
        echo "=== CGAL libraries ==="
        ls -la /tmp/lib/cgal/lib/ || true
        echo "=== Environment variables ==="
        echo "LDFLAGS: $LDFLAGS"
        echo "CPPFLAGS: $CPPFLAGS"

    - name: Build wheel
      run: |
        # Set environment variables for the build
        export MACOSX_DEPLOYMENT_TARGET=14.0
        export CGAL_DIR="/tmp/lib/cgal"
        export BOOST_DIR="/tmp/lib/boost"
        export BOOST_ROOT="/tmp/lib/boost"
        
        # Add Homebrew paths to build environment
        export CPATH="$HOMEBREW_PREFIX/include:/tmp/lib/boost/include:/tmp/lib/cgal/include:$CPATH"
        export LIBRARY_PATH="$HOMEBREW_PREFIX/lib:/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="$HOMEBREW_PREFIX/lib:/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$LD_LIBRARY_PATH"
        export DYLD_LIBRARY_PATH="$HOMEBREW_PREFIX/lib:/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$DYLD_LIBRARY_PATH"
        
        # Set compiler flags to include all necessary paths
        export CPPFLAGS="-I$HOMEBREW_PREFIX/include -I/tmp/lib/cgal/include -I/tmp/lib/boost/include"
        export LDFLAGS="-L$HOMEBREW_PREFIX/lib -L/tmp/lib/cgal/lib -L/tmp/lib/boost/lib -lgmp -lmpfr"
        
        # Set additional environment variables for setup.py
        export GMP_DIR="$HOMEBREW_PREFIX"
        export MPFR_DIR="$HOMEBREW_PREFIX"
        export EIGEN3_INCLUDE_DIR="$HOMEBREW_PREFIX/include/eigen3"
        
        # Build the extension in place first with explicit paths
        python setup.py build_ext --inplace \
          --include-dirs="$HOMEBREW_PREFIX/include:$HOMEBREW_PREFIX/include/eigen3:/tmp/lib/cgal/include:/tmp/lib/boost/include" \
          --library-dirs="$HOMEBREW_PREFIX/lib:/tmp/lib/cgal/lib:/tmp/lib/boost/lib"
        
        # Build the wheel
        python setup.py bdist_wheel

    - name: Repair wheel
      run: |

        # Install delocate for wheel repair
        pip install delocate
        
        set -x
        
        # Create repaired directory
        mkdir -p dist/repaired/
        
        # First, let's inspect what we built
        echo "=== Checking built wheel ==="
        ls -la dist/
        wheel_name=$(ls dist/*.whl | head -1)
        echo "Wheel file: $wheel_name"
        
        # Extract the wheel to inspect and fix dependencies
        cd dist
        wheel_basename=$(basename $wheel_name)
        unzip -q $wheel_basename -d temp_wheel/
        
        # Find the .so file
        so_file=$(find temp_wheel -name "*.so" | head -1)
        echo "Found .so file: $so_file"
        
        # Check its current dependencies
        echo "=== Current dependencies ==="
        otool -L "$so_file"
        
        # Copy required Boost libraries to a temp location accessible by delocate
        echo "=== Copying Boost libraries ==="
        mkdir -p /tmp/wheel_libs
        cp /tmp/lib/boost/lib/libboost_*.dylib /tmp/wheel_libs/ 2>/dev/null || true
        cp /tmp/lib/cgal/lib/*.dylib /tmp/wheel_libs/ 2>/dev/null || true
        ls -la /tmp/wheel_libs/
        
        # Use install_name_tool to fix the @rpath references to absolute paths
        echo "=== Fixing library paths ==="
        for lib in thread atomic system date_time chrono filesystem program_options iostreams serialization; do
          if otool -L "$so_file" | grep -q "libboost_${lib}"; then
            echo "Fixing libboost_${lib}..."
            install_name_tool -change "@rpath/libboost_${lib}.dylib" "/tmp/wheel_libs/libboost_${lib}.dylib" "$so_file" 2>/dev/null || true
          fi
        done
        
        # Check the result after fixing
        echo "=== Dependencies after fixing ==="
        otool -L "$so_file"
        
        # Repackage the wheel
        cd temp_wheel
        zip -r "../${wheel_basename}" .
        cd ..
        
        # Now try delocate with the fixed wheel
        echo "=== Running delocate ==="
        export DYLD_LIBRARY_PATH="/tmp/wheel_libs:/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$HOMEBREW_PREFIX/lib:$DYLD_LIBRARY_PATH"
        
        # Copy the libraries to locations where delocate can find them
        sudo mkdir -p /usr/local/lib
        sudo cp /tmp/wheel_libs/*.dylib /usr/local/lib/ 2>/dev/null || true
        
        delocate-wheel -w repaired/ -v $wheel_basename
        
        # If delocate still fails, use the manually fixed wheel
        if [ $? -ne 0 ]; then
          echo "=== Delocate failed, using manually fixed wheel ==="
          cp $wheel_basename repaired/
        fi
        
        # Clean up
        rm -rf temp_wheel/
        cd ..

    - name: Run tests
      shell: bash
      run: |
        export DYLD_LIBRARY_PATH="/tmp/lib/boost/lib:/tmp/lib/cgal/lib:$HOMEBREW_PREFIX/lib:$DYLD_LIBRARY_PATH"

        # Install the wheel for testing
        pip install dist/repaired/*.whl
        
        # Run tests
        python -m pytest test -v

    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-wheels-py${{ matrix.python-version }}-${{ matrix.os }}
        path: |
          dist/repaired/*.whl
          dist/*.whl
        retention-days: 90
